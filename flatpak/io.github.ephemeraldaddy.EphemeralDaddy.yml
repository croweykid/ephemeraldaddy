app-id: io.github.ephemeraldaddy.EphemeralDaddy
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: ephemeraldaddy
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
modules:
  - name: ephemeraldaddy-bundle
    buildsystem: simple
    build-commands:
      - install -d /app/lib/ephemeraldaddy
      - cp -a ../dist/EphemeralDaddy/. /app/lib/ephemeraldaddy/
      - install -d /app/bin
      - install -Dm755 flatpak/ephemeraldaddy-launcher.sh /app/bin/ephemeraldaddy
      - install -Dm644 packaging/linux/io.github.ephemeraldaddy.EphemeralDaddy.desktop /app/share/applications/io.github.ephemeraldaddy.EphemeralDaddy.desktop
      - install -Dm644 ephemeraldaddy/graphics/ephemeraldaddy1.png /app/share/icons/hicolor/512x512/apps/io.github.ephemeraldaddy.EphemeralDaddy.png
    sources:
      - type: dir
        path: ..
